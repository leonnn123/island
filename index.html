<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO Island Web Debugger</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: monospace; color: #0f0; }
        canvas { border: 2px solid #555; max-width: 100%; max-height: 70vh; background: #222; }
        #picker-container { text-align: center; margin-bottom: 15px; background: #222; padding: 20px; border-radius: 8px; border: 1px solid #444; position: absolute; z-index: 10; width: 400px; color: white; }
        #picker { margin-top: 10px; padding: 10px; background: #333; border: 1px solid #555; border-radius: 5px; color: white; cursor: pointer; }
        #progress-container { width: 100%; background-color: #444; border-radius: 10px; margin-top: 15px; display: none; overflow: hidden; border: 1px solid #555; }
        #progress-bar { width: 0%; height: 20px; background-color: #00cc44; }
        #debug-log { width: 80%; height: 20vh; background: #111; border: 1px solid #333; margin-top: 10px; overflow-y: scroll; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="picker-container">
        <div id="status">Please select your local LEGO asset folder to start</div>
        <input type="file" id="picker" webkitdirectory directory multiple>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    
    <div id="debug-log">--- Engine Diagnostic Console Log ---<br></div>

    <script type="text/javascript">
        function logToScreen(text) {
            var log = document.getElementById('debug-log');
            log.innerHTML += text + "<br>";
            log.scrollTop = log.scrollHeight;
        }

        var Module = {
            noInitialRun: true, 
            preRun: [function() {
                try { FS.mkdir('/LEGO'); } catch(err) {}
            }],
            postRun: [],
            canvas: (function() { return document.getElementById('canvas'); })(),
            print: function(text) { logToScreen("INFO: " + text); },
            printErr: function(text) { logToScreen("<span style='color:red;'>CRASH/WARN: " + text + "</span>"); },
            setStatus: function(text) { if(text) logToScreen("STATUS: " + text); }
        };

        function startEngine() {
            document.getElementById('picker-container').style.display = 'none';
            logToScreen("Starting engine compilation runtime loop...");
            try {
                if (typeof shouldRunNow === 'function') { shouldRunNow(); } 
                else if (Module.run) { Module.run(); }
            } catch(e) {
                logToScreen("<span style='color:red; font-weight:bold;'>RUNTIME CRASH: " + e.message + "</span>");
            }
        }

        document.getElementById('picker').addEventListener('change', function(e) {
            var files = e.target.files;
            if (files.length === 0) return;

            try { FS.mkdir('/LEGO'); } catch(err) {}
            document.getElementById('picker').style.display = 'none';
            document.getElementById('progress-container').style.display = 'block';
            
            var loadedCount = 0;
            var totalFiles = files.length;
            var progressBar = document.getElementById('progress-bar');

            for (var i = 0; i < totalFiles; i++) {
                var file = files[i];
                var filename = file.name.toUpperCase();
                
                // Track files being loaded right onto the screen log
                logToScreen("Mounting file: /LEGO/" + filename);

                (function(f, name) {
                    var reader = new FileReader();
                    reader.onload = function(event) {
                        var arrayBuffer = event.target.result;
                        var uint8Array = new Uint8Array(arrayBuffer);
                        
                        FS.createDataFile('/LEGO', name, uint8Array, true, true, true);
                        
                        loadedCount++;
                        var percentage = Math.round((loadedCount / totalFiles) * 100);
                        progressBar.style.width = percentage + '%';
                        document.getElementById('status').innerText = "Loading: " + percentage + "%";
                        
                        if (loadedCount === totalFiles) {
                            startEngine();
                        }
                    };
                    reader.readAsArrayBuffer(f);
                })(file, filename);
            }
        });
    </script>
    
    <script async type="text/javascript" src="isle.js"></script>

</body>
</html>
