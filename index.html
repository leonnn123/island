<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO Island Web</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #555; max-width: 100%; max-height: 100%; background: #222; }
    </style>
</head>
<body>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type="text/javascript">
        var Module = {
            preRun: [function() {
                // Creates a virtual LEGO folder inside the browser's memory
                try { FS.mkdir('/LEGO'); } catch(e) {}
                
                // Essential game files required to launch the game loop
                var assets = [
                    'LEGO1.WLV', 'ISLAND.WLV', 'INFOMAIN.WLV', 
                    'SNDANIM.SI', 'LEGO1.SI', 'ISLAND.SI'
                ];
                
                assets.forEach(function(file) {
                    FS.createLazyFile(
                        '/LEGO', 
                        file, 
                        'https://corsproxy.io?' + encodeURIComponent('https://archive.org' + file), 
                        true, 
                        false
                    );
                });
            }],
            postRun: [],
            canvas: (function() { return document.getElementById('canvas'); })(),
            setStatus: function(text) { console.log(text); }
        };
    </script>
    
    <script async type="text/javascript" src="isle.js"></script>

</body>
